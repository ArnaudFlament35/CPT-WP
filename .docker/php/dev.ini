; Configuration PHP pour le développement local
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On
error_log = /var/log/php/error.log

; Limites plus généreuses pour le développement
memory_limit = 256M
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 300

; Désactivation du cache opcache pour voir les changements immédiatement
opcache.enable = 0
